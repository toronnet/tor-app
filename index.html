function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}
function overlaps(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function spawnFX(x, y, color, n=8) {

function mkCoins(pos) {
  return pos.map(([x,y]) => ({x, y, collected:false, bob:Math.random()*Math.PI*2}));
}

// ---- PLAYER FACTORY ----
function newPlayer(ci) {
  return {
    x:80, y:400, w:28, h:40,
    vx:0, vy:0,
    onGround:false,
    jumpsLeft:1,
    charIdx:ci,
    lives:3,
    coins:0,
    facing:1,
    animFrame:0, animTimer:0,
    invincible:0,
    cooldown:0, cooldownMax:300,
    abilityTimer:0,
    shielded:false, speedy:false, floating:false,
    coinMult:1,
    hasFireball:false, fireballTimer:0, fireballCooldown:0,
    beerActive:false, beerTimer:0,
  };
}

// ---- INIT GAME ----
function initGame(ci) {
  player = newPlayer(ci);
  score = 0;
  loadLevel(0);
  gameState = 'playing';
}

function loadLevel(idx) {
  currentLevel = idx;
  const all = makeLevelData();
  levelData = all[idx];
  LEVEL_WIDTH = levelData.width || 3200;
  isBossLevel = !!levelData.isBoss;
  platforms = levelData.platforms;
  enemies   = levelData.enemies.map(e => ({...e}));
  coins     = levelData.coins.map(c => ({...c}));
  goal      = levelData.goal;
  camera.x  = 0;
  particles = [];
  shockwaves = [];
  fireballs = [];
  powerups = (levelData.powerups || []).map(p => ({...p, collected:false, bob:Math.random()*Math.PI*2}));
  boss = isBossLevel ? createBoss() : null;
  const savedLives = player.lives;
  const savedCoins = player.coins;
  player = newPlayer(player.charIdx);
  player.lives = savedLives;
  player.coins = savedCoins;
  player.x = levelData.startX;
  player.y = levelData.startY;
}

// ---- PLATFORM COLLISION ----
function resolveCollision() {
  player.onGround = false;

  // Horizontal pass
  for (const p of platforms) {
    if (!overlaps(player, p)) continue;
    if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; }
    else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; }
  }
  // Vertical pass
  for (const p of platforms) {
    if (!overlaps(player, p)) continue;
    if (player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumpsLeft = CHARS[player.charIdx].ability === 'doubleJump' ? 2 : 1;
    } else {
      player.y = p.y + p.h;
      player.vy = 1;
    }
  }
}

// ---- ABILITY ----
function useAbility() {
  if (player.cooldown > 0) return;
  const ab = CHARS[player.charIdx].ability;
  const col = CHARS[player.charIdx].color;
  const cx = player.x + player.w/2, cy = player.y + player.h/2;

  if (ab === 'shield') {
    player.shielded = true; player.abilityTimer = 180;
    player.cooldown = player.cooldownMax;
    spawnFX(cx, cy, '#aaddff', 12);
  } else if (ab === 'magnet') {
    for (const c of coins) {
      if (c.collected) continue;
      const dx = c.x - cx, dy = c.y - cy;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 280) { c.x -= dx*0.4; c.y -= dy*0.4; }
    }
    player.cooldown = 80;
    spawnFX(cx, cy, col, 8);
  } else if (ab === 'speed') {
    player.speedy = true; player.abilityTimer = 180;
    player.cooldown = player.cooldownMax;
    spawnFX(cx, cy, col, 8);
  } else if (ab === 'dash') {
    player.vx = player.facing * 16;
    player.cooldown = 130;
    spawnFX(cx, cy, col, 10);
  } else if (ab === 'coinDouble') {
    player.coinMult = 2; player.abilityTimer = 300;
    player.cooldown = player.cooldownMax;
    spawnFX(cx, cy, '#FFD700', 10);
  } else if (ab === 'highJump') {
    player.vy = -19;
    player.cooldown = 200;
    spawnFX(cx, cy, col, 10);
  } else if (ab === 'float') {
    player.floating = true; player.abilityTimer = 200;
    player.cooldown = player.cooldownMax;
    spawnFX(cx, cy, col, 8);
  } else if (ab === 'extraLife') {
    player.lives++;
    player.cooldown = player.cooldownMax * 4;
    spawnFX(cx, cy, col, 16);
  }
  // doubleJump is passive — no manual trigger needed
}

// ---- UPDATE ----
function update() {
  const ch = CHARS[player.charIdx];

  // Camera
  camera.x += (player.x - W/2 + player.w/2 - camera.x) * 0.12;
  camera.x = Math.max(0, Math.min(LEVEL_WIDTH - W, camera.x));

  // Movement
  const spd = player.speedy ? 5.5 : 3.5;
  if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -spd; player.facing = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = spd; player.facing = 1; }
  else player.vx *= 0.78;

  // Jump
  if ((jp['Space'] || jp['ArrowUp'] || jp['KeyW']) && player.jumpsLeft > 0) {
    player.vy = -12.5;
    player.jumpsLeft--;
    spawnFX(player.x + player.w/2, player.y + player.h, '#ffffff', 4);
  }

  // Ability
  if (jp['KeyE'] || jp['ShiftLeft']) useAbility();

  // Float hold
  if (player.floating && (keys['Space'] || keys['ArrowUp'] || keys['KeyW'])) {
    player.vy = Math.min(player.vy, -0.8);
  }

  // Gravity
  player.vy += player.floating ? 0.18 : 0.55;
  player.vy = Math.min(player.vy, 18);

  // Move X, resolve, move Y, resolve
  player.x += player.vx;
  // clamp horizontal
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > LEVEL_WIDTH) player.x = LEVEL_WIDTH - player.w;

  // horizontal collision only
  for (const p of platforms) {
    if (!overlaps(player, p)) continue;
    if (player.vx > 0 && player.x + player.w > p.x && player.x < p.x) {
      player.x = p.x - player.w; player.vx = 0;
    } else if (player.vx < 0 && player.x < p.x + p.w && player.x + player.w > p.x + p.w) {
      player.x = p.x + p.w; player.vx = 0;
    }
  }

  player.y += player.vy;

  // vertical collision
  player.onGround = false;
  for (const p of platforms) {
    if (!overlaps(player, p)) continue;
    if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 4) {
      player.y = p.y - player.h; player.vy = 0; player.onGround = true;
      player.jumpsLeft = ch.ability === 'doubleJump' ? 2 : 1;
    } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 4) {
      player.y = p.y + p.h; player.vy = 2;
    }
  }

  // Fall death — bypasses invincibility (beer can't save you from the void)
  if (player.y > H + 80) { die(true); return; }

  // Timers
  if (player.invincible > 0) player.invincible--;
  if (player.cooldown > 0) player.cooldown--;
  if (player.abilityTimer > 0) {
    player.abilityTimer--;
    if (player.abilityTimer <= 0) {
      player.shielded = false; player.speedy = false;
      player.floating = false; player.coinMult = 1;
    }
  }

  // Walk animation
  player.animTimer++;
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    if (player.animTimer % 8 === 0) player.animFrame = (player.animFrame+1) % 4;
  } else player.animFrame = 0;

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.x <= e.sx || e.x + e.w >= e.ex) e.vx *= -1;

    if (player.invincible <= 0 && overlaps(player, e)) {
      const bot = player.y + player.h;
      if (player.vy > 0 && bot - e.y < 14) {
        e.alive = false; player.vy = -9; score += 100;
        spawnFX(e.x+e.w/2, e.y+e.h/2, '#FF6347', 12);
      } else if (player.shielded) {
        e.alive = false; spawnFX(e.x+e.w/2, e.y+e.h/2, '#aaddff', 10);
      } else {
        die(); return;
      }
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    c.bob += 0.05;
    const cr = {x:c.x-8, y:c.y+Math.sin(c.bob)*3-8, w:16, h:16};
    if (overlaps(player, cr)) {
      c.collected = true;
      player.coins += player.coinMult;
      score += 50 * player.coinMult;
      spawnFX(c.x, c.y, '#FFD700', 6);
    }
  }

  // Goal
  if (overlaps(player, {x:goal.x, y:goal.y, w:44, h:80})) {
    spawnFX(goal.x+22, goal.y+20, '#FFD700', 20);
    if (currentLevel < 3) { loadLevel(currentLevel+1); }
    else { gameState = 'win'; }
  }

  // Powerup collection
  for (const pu of powerups) {
    if (pu.collected) continue;
    pu.bob += 0.06;
    if (overlaps(player, {x:pu.x-11, y:pu.y+Math.sin(pu.bob)*4-11, w:22, h:22})) {
      pu.collected = true;
      if (pu.type === 'fireball') {
        player.hasFireball = true;
        player.fireballTimer = 900; // 15 sec
        spawnFX(pu.x, pu.y, '#FF8800', 14);
      } else {
        player.beerActive = true;
        player.beerTimer = 480; // 8 sec
        player.invincible = 480;
        spawnFX(pu.x, pu.y, '#FFD700', 14);
      }
    }
  }

  // Shoot fireball
  if ((jp['KeyZ'] || jp['KeyX']) && player.hasFireball && player.fireballCooldown <= 0) {
    fireballs.push({ x:player.x+player.w/2, y:player.y+player.h*0.4, vx:player.facing*10, vy:-0.5, bounces:0, life:220 });
    player.fireballCooldown = 18;
    spawnFX(player.x+player.w/2, player.y+player.h*0.4, '#FF6600', 4);
  }

  // Update fireballs
  for (let i = fireballs.length-1; i >= 0; i--) {
    const fb = fireballs[i];
    fb.life--; if (fb.life <= 0) { fireballs.splice(i,1); continue; }
    fb.vy += 0.35;
    fb.x += fb.vx; fb.y += fb.vy;
    // Platform bounce
    for (const p of platforms) {
      if (overlaps({x:fb.x-6,y:fb.y-6,w:12,h:12}, p)) {
        if (fb.bounces < 1 && fb.vy > 0) { fb.y = p.y-6; fb.vy = -Math.abs(fb.vy)*0.55; fb.bounces++; }
        else { fireballs.splice(i,1); break; }
      }
    }
    if (i >= fireballs.length) continue;
    if (fb.x < -20 || fb.x > LEVEL_WIDTH+20 || fb.y > H+40) { fireballs.splice(i,1); continue; }
    // Kill enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (overlaps({x:fb.x-8,y:fb.y-8,w:16,h:16}, e)) {
        e.alive = false; fireballs.splice(i,1); score += 150;
        spawnFX(e.x+e.w/2, e.y+e.h/2, '#FF6600', 10);
        break;
      }
    }
    if (i >= fireballs.length) continue;
    // Damage boss
    if (isBossLevel && boss && !boss.dead) {
      if (overlaps({x:fb.x-8,y:fb.y-8,w:16,h:16}, boss)) { hitBoss(); fireballs.splice(i,1); continue; }
    }
  }

  // Beer: kill enemies on touch
  if (player.beerActive) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (overlaps(player, e)) { e.alive = false; score += 100; spawnFX(e.x+e.w/2, e.y+e.h/2, '#FFD700', 8); }
    }
  }

  // Fireball / beer timers
  if (player.fireballCooldown > 0) player.fireballCooldown--;
  if (player.hasFireball) { player.fireballTimer--; if (player.fireballTimer <= 0) player.hasFireball = false; }
  if (player.beerActive) {
    player.beerTimer--;
    if (player.invincible < 2) player.invincible = 2; // keep invincible while beer active
    if (player.beerTimer <= 0) { player.beerActive = false; player.invincible = 0; }
  }

  // Boss
  if (isBossLevel && boss) updateBoss();

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function die(force = false) {
  if (!force && player.invincible > 0) return;
  player.lives--;
  spawnFX(player.x+player.w/2, player.y+player.h/2, '#FF2222', 16);
  if (player.lives <= 0) { gameState = 'gameover'; return; }
  player.x = levelData.startX; player.y = levelData.startY;
  player.vx = 0; player.vy = 0; player.invincible = 100;
  player.shielded = false; player.speedy = false; player.floating = false;
  // Reset power-ups on death
  player.beerActive = false; player.beerTimer = 0;
  player.hasFireball = false; player.fireballTimer = 0;
}

// ---- POWERUP & FIREBALL DRAWING ----
function drawPowerups() {
  for (const pu of powerups) {
    if (pu.collected) continue;
    const sx = pu.x - camera.x;
    if (sx < -30 || sx > W+30) continue;
    const by = pu.y + Math.sin(pu.bob)*4;

    if (pu.type === 'fireball') {
      // Spinning fire flower
      const t = Date.now() / 400;
      ctx.shadowColor = '#FF6600'; ctx.shadowBlur = 14;
      for (let p = 0; p < 5; p++) {
        const a = (Math.PI*2/5)*p + t;
        ctx.fillStyle = '#FF4400';
        ctx.beginPath(); ctx.arc(sx+Math.cos(a)*10, by+Math.sin(a)*10, 5, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#FF8800'; ctx.beginPath(); ctx.arc(sx, by, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFEE44'; ctx.beginPath(); ctx.arc(sx, by, 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FF8800'; ctx.font = 'bold 8px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('FIRE', sx, by+24);

    } else {
      // Beer mug
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#D4880A'; ctx.fillRect(sx-9, by-12, 18, 20);  // mug body
      ctx.fillStyle = '#F5A623'; ctx.fillRect(sx-7, by-10, 14, 16);  // amber beer
      ctx.fillStyle = '#ffffff'; ctx.fillRect(sx-9, by-15, 18, 7);   // foam top
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(sx-7,by-14,4,4); ctx.fillRect(sx+1,by-13,3,3); // bubbles
      // handle
      ctx.strokeStyle = '#D4880A'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(sx+12, by-4, 6, -Math.PI/2, Math.PI/2); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 8px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('BEER', sx, by+16);
    }
  }
}

function drawFireballs() {
  for (const fb of fireballs) {
    const sx = fb.x - camera.x;
    ctx.shadowColor = '#FF6600'; ctx.shadowBlur = 16;
    // trail
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#FF8800';
    ctx.beginPath(); ctx.arc(sx - fb.vx*0.4, fb.y - fb.vy*0.4, 6, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // main ball
    ctx.fillStyle = '#FF3300'; ctx.beginPath(); ctx.arc(sx, fb.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFCC00'; ctx.beginPath(); ctx.arc(sx-1, fb.y-1, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ---- BOSS LOGIC ----
function createBoss() {
  return {
    x:540, y:-120, w:72, h:90,
    vx:0, vy:0,
    onGround:false,
    hp:7, maxHp:7,
    phase:1,
    state:'intro',   // intro|walk|charge|jump|slam|hurt|dead
    stateTimer:0,
    hurtTimer:0,
    facing:-1,
    animTimer:0,
    dead:false,
    deadTimer:0,
  };
}

function updateBoss() {
  if (!boss || boss.dead) return;

  // Phase transition
  if (boss.hp <= 3 && boss.phase === 1) {
    boss.phase = 2;
    spawnFX(boss.x+boss.w/2, boss.y+boss.h/2, '#FF4400', 25);
  }

  if (boss.hurtTimer > 0) boss.hurtTimer--;
  boss.animTimer++;

  // --- INTRO: drop from ceiling ---
  if (boss.state === 'intro') {
    boss.vy = Math.min(boss.vy + 0.5, 14);
    boss.y += boss.vy;
    for (const p of platforms) {
      if (overlaps(boss, p) && boss.vy > 0 && boss.y + boss.h - boss.vy <= p.y + 8) {
        boss.y = p.y - boss.h;
        boss.vy = 0;
        boss.onGround = true;
        boss.state = 'walk';
        boss.stateTimer = 90;
        spawnFX(boss.x+boss.w/2, boss.y+boss.h, '#FF4400', 22);
        shockwaves.push({x:boss.x-14, y:boss.y+boss.h-12, w:28, h:12, vx:-5, life:50});
        shockwaves.push({x:boss.x+boss.w-14, y:boss.y+boss.h-12, w:28, h:12, vx:5, life:50});
      }
    }
    return;
  }

  // Gravity
  boss.vy = Math.min(boss.vy + 0.55, 18);
  boss.stateTimer--;

  const dx = (player.x+player.w/2) - (boss.x+boss.w/2);
  boss.facing = dx > 0 ? 1 : -1;

  switch (boss.state) {
    case 'walk': {
      const spd = boss.phase === 2 ? 2.4 : 1.5;
      boss.vx = boss.facing * spd;
      if (boss.stateTimer <= 0) {
        const r = Math.random();
        if (r < 0.35) {
          boss.state = 'charge'; boss.stateTimer = boss.phase === 2 ? 52 : 68;
        } else if (r < 0.65 && boss.onGround) {
          boss.state = 'jump';
          boss.vy = -15; boss.vx = boss.facing * 3;
          boss.stateTimer = 140;
        } else {
          boss.stateTimer = 70 + Math.random()*50;
        }
      }
      break;
    }
    case 'charge':
      boss.vx = boss.facing * (boss.phase === 2 ? 9 : 7);
      if (boss.stateTimer <= 0) { boss.state = 'walk'; boss.stateTimer = 60; boss.vx = 0; }
      break;
    case 'jump':
      boss.vx *= 0.99;
      if (boss.onGround && boss.stateTimer < 110) {
        boss.state = 'slam'; boss.stateTimer = 38; boss.vx = 0;
        spawnFX(boss.x+boss.w/2, boss.y+boss.h, '#FF4400', 18);
        shockwaves.push({x:boss.x-14, y:boss.y+boss.h-12, w:28, h:12, vx:-5, life:55});
        shockwaves.push({x:boss.x+boss.w-14, y:boss.y+boss.h-12, w:28, h:12, vx:5, life:55});
        if (boss.phase === 2) {
          shockwaves.push({x:boss.x-14, y:boss.y+boss.h-12, w:28, h:12, vx:-9, life:55});
          shockwaves.push({x:boss.x+boss.w-14, y:boss.y+boss.h-12, w:28, h:12, vx:9, life:55});
        }
      }
      break;
    case 'slam':
      boss.vx *= 0.85;
      if (boss.stateTimer <= 0) { boss.state = 'walk'; boss.stateTimer = 70; }
      break;
    case 'hurt':
      boss.vx *= 0.80;
      if (boss.stateTimer <= 0) { boss.state = 'walk'; boss.stateTimer = 60; }
      break;
  }

  // Move + platform collision
  boss.x += boss.vx;
  boss.y += boss.vy;
  boss.onGround = false;
  for (const p of platforms) {
    if (!overlaps(boss, p)) continue;
    if (boss.vy >= 0 && boss.y + boss.h - boss.vy <= p.y + 8) {
      boss.y = p.y - boss.h; boss.vy = 0; boss.onGround = true;
    } else if (boss.vy < 0 && boss.y >= p.y + p.h - 6) {
      boss.y = p.y + p.h; boss.vy = 2;
    }
  }

  // Arena wall bounds
  if (boss.x < 10) { boss.x = 10; boss.vx = Math.abs(boss.vx); boss.facing = 1; }
  if (boss.x + boss.w > 1190) { boss.x = 1190 - boss.w; boss.vx = -Math.abs(boss.vx); boss.facing = -1; }

  // Shockwaves
  for (let i = shockwaves.length-1; i >= 0; i--) {
    const sw = shockwaves[i];
    sw.x += sw.vx; sw.life--;
    if (sw.life <= 0 || sw.x < -40 || sw.x > 1240) { shockwaves.splice(i, 1); continue; }
    if (player.invincible <= 0 && overlaps(player, {x:sw.x, y:sw.y, w:sw.w, h:sw.h})) { die(); return; }
  }

  // Player hits boss
  if (player.invincible <= 0 && overlaps(player, boss) && boss.hurtTimer === 0) {
    const playerBot = player.y + player.h;
    if (player.vy > 0 && playerBot - boss.y < 20 && boss.state !== 'slam') {
      hitBoss(); player.vy = -11;
    } else if (player.shielded) {
      hitBoss(); player.vy = -8;
    } else {
      die(); return;
    }
  }
}

function hitBoss() {
  if (boss.hurtTimer > 0) return;
  boss.hp--;
  boss.hurtTimer = 50; boss.state = 'hurt'; boss.stateTimer = 50;
  boss.vx = -boss.facing * 7;
  score += 200;
  spawnFX(boss.x+boss.w/2, boss.y+boss.h/2, '#FFD700', 14);
  if (boss.hp <= 0) {
    boss.dead = true; boss.deadTimer = 150; score += 1500;
    for (let j = 0; j < 6; j++)
      setTimeout(() => { if (boss) spawnFX(boss.x + Math.random()*boss.w, boss.y + Math.random()*boss.h, ['#FF4400','#FFD700','#FF2222'][j%3], 14); }, j*180);
  }
}

function drawBoss() {
  if (!boss) return;
  const bx = boss.x - camera.x, by = boss.y;

  if (boss.dead) {
    boss.deadTimer--;
    if (boss.deadTimer <= 0) { gameState = 'win'; return; }
    if (Math.floor(boss.deadTimer/6) % 2 === 0) {
      ctx.globalAlpha = boss.deadTimer / 150;
      ctx.fillStyle = '#FF4400';
      ctx.fillRect(bx, by, boss.w, boss.h);
      ctx.globalAlpha = 1;
    }
    return;
  }

  if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/4) % 2 === 0) ctx.globalAlpha = 0.35;
  if (boss.phase === 2) { ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 24; }

  const bc = boss.state === 'charge' ? '#770000' : (boss.phase === 2 ? '#aa1111' : '#cc2222');

  // Body
  ctx.fillStyle = bc; ctx.fillRect(bx, by, boss.w, boss.h);
  // Belly
  ctx.fillStyle = boss.phase === 2 ? '#cc3300' : '#dd4444';
  ctx.fillRect(bx+10, by+boss.h*0.46, boss.w-20, boss.h*0.38);
  // Head
  ctx.fillStyle = boss.phase === 2 ? '#cc1111' : '#ff3333';
  ctx.fillRect(bx+4, by+4, boss.w-8, boss.h*0.42);
  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bx+8, by+8, 18, 18); ctx.fillRect(bx+boss.w-26, by+8, 18, 18);
  const pd = dx => dx > 0 ? 2 : -2;
  const eyeDir = (player.x+player.w/2) > (boss.x+boss.w/2) ? 2 : -2;
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(bx+10+eyeDir, by+10, 10, 10); ctx.fillRect(bx+boss.w-24+eyeDir, by+10, 10, 10);
  ctx.fillStyle = '#000';
  ctx.fillRect(bx+12+eyeDir, by+12, 6, 6); ctx.fillRect(bx+boss.w-22+eyeDir, by+12, 6, 6);
  // Mouth
  ctx.fillStyle = '#000'; ctx.fillRect(bx+14, by+boss.h*0.37, boss.w-28, 5);
  if (boss.phase === 2) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(bx+17, by+boss.h*0.37-5, 7, 7); ctx.fillRect(bx+30, by+boss.h*0.37-5, 7, 7);
    ctx.fillRect(bx+boss.w-32, by+boss.h*0.37-5, 7, 7);
  }
  // Claws
  ctx.fillStyle = darken(bc, 25);
  ctx.fillRect(bx-10, by+boss.h*0.48, 16, 9); ctx.fillRect(bx+boss.w-6, by+boss.h*0.48, 16, 9);
  // Legs (animated walk)
  const legOff = boss.onGround && Math.abs(boss.vx)>0.5 ? [0,4,0,-4][Math.floor(boss.animTimer/7)%4] : 0;
  ctx.fillStyle = darken(bc, 35);
  ctx.fillRect(bx+10, by+boss.h-14, 16, 14+legOff); ctx.fillRect(bx+boss.w-26, by+boss.h-14, 16, 14-legOff);

  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // Mini HP bar above boss
  const hbW = boss.w+24, hbX = bx-12, hbY = by-20;
  ctx.fillStyle = '#330000'; ctx.fillRect(hbX, hbY, hbW, 10);
  const hpC = boss.hp/boss.maxHp > 0.5 ? '#ff2222' : boss.hp/boss.maxHp > 0.25 ? '#ff7700' : '#ffdd00';
  ctx.fillStyle = hpC; ctx.fillRect(hbX, hbY, hbW*(boss.hp/boss.maxHp), 10);
  ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1; ctx.strokeRect(hbX, hbY, hbW, 10);
  ctx.fillStyle = boss.phase===2 ? '#FF6600' : '#FF2222';
  ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('☠ MEGA BUG ☠', bx+boss.w/2, hbY-3);
}

function drawShockwaves() {
  for (const sw of shockwaves) {
    const sx = sw.x - camera.x;
    ctx.shadowColor = '#FF6600'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#FF6600'; ctx.fillRect(sx, sw.y, sw.w, sw.h);
    ctx.fillStyle = '#FFCC44'; ctx.fillRect(sx+2, sw.y+1, sw.w-4, sw.h-3);
    ctx.shadowBlur = 0;
  }
}

function drawBossHUD() {
  if (!boss || boss.dead || boss.state === 'intro') return;
  const barW = W*0.55, barH = 22, barX = (W-barW)/2, barY = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(barX-6, barY-5, barW+12, barH+10);
  const hpPct = boss.hp / boss.maxHp;
  const col = hpPct > 0.5 ? '#ff2222' : hpPct > 0.25 ? '#ff7700' : '#ffdd00';
  ctx.fillStyle = '#1a0000'; ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = col; ctx.fillRect(barX, barY, barW*hpPct, barH);
  ctx.fillStyle = `rgba(255,255,255,${0.08+0.07*Math.sin(Date.now()/110)})`;
  ctx.fillRect(barX, barY, barW*hpPct, barH/2);
  ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('☠ MEGA BUG  ' + boss.hp + ' / ' + boss.maxHp + (boss.phase===2 ? '  [ ENRAGED ]' : ''), W/2, barY+barH-5);
}

// ---- DRAW HELPERS ----
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, levelData.bg1); g.addColorStop(1, levelData.bg2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  if (isBossLevel) {
    // Pulsing red vignette
    const pulse = 0.12 + 0.06*Math.sin(Date.now()/400);
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(180,0,0,${pulse})`);
    ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
    // Dim red grid lines
    ctx.strokeStyle = 'rgba(120,0,0,0.15)'; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  } else {
    // Stars

function drawPlayer() {
  const ch = CHARS[player.charIdx];
  const sx = player.x - camera.x;
  const sy = player.y;

  if (player.invincible > 0 && !player.beerActive && Math.floor(player.invincible/5) % 2 === 0) return;

  // Beer rainbow aura
  if (player.beerActive) {
    const flashFast = player.beerTimer < 120; // flash faster in last 2 sec
    if (flashFast && Math.floor(Date.now()/80) % 2 === 0) { /* skip for flash */ }
    else {
      const hue = (Date.now() / 25) % 360;
      ctx.shadowColor = `hsl(${hue},100%,60%)`; ctx.shadowBlur = 22;
      ctx.strokeStyle = `hsl(${hue},100%,70%)`; ctx.lineWidth = 4;
      ctx.strokeRect(sx-6, sy-6, player.w+12, player.h+12);
      ctx.shadowBlur = 0;
    }
  }

  // Shield ring
  if (player.shielded) {
    ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 22;
    ctx.strokeStyle = 'rgba(150,210,255,0.55)'; ctx.lineWidth = 3;
    ctx.strokeRect(sx-5, sy-5, player.w+10, player.h+10);
    ctx.shadowBlur = 0;
  }
  // Speed trail
  if (player.speedy) {
    ctx.fillStyle = 'rgba(255,99,71,0.25)';
    ctx.fillRect(sx - player.facing*18, sy+12, player.w, player.h-16);
  }
  // Float glow
  if (player.floating && !player.onGround) {
    ctx.shadowColor = ch.color; ctx.shadowBlur = 14;
  }

  // Legs (drawn behind photo)
  const lo = [0,4,0,-4][player.animFrame];
  ctx.fillStyle = darken(ch.color, 20);
  if (player.onGround) {
    ctx.fillRect(sx+3,  sy+player.h-11, 9, 11+lo);
    ctx.fillRect(sx+player.w-12, sy+player.h-11, 9, 11-lo);
  } else {
    ctx.fillRect(sx+3,  sy+player.h-12, 9, 12);
    ctx.fillRect(sx+player.w-12, sy+player.h-9, 9, 9);
  }

  // Photo portrait (or fallback colored block)
  const pW = player.w + 8, pH = player.h - 8;
  const pX = sx - 4, pY = sy - 4;
  if (imgReady(player.charIdx)) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(pX, pY, pW, pH);
    ctx.clip();
    // flip horizontally when facing left
    if (player.facing < 0) {
      ctx.scale(-1, 1);
      ctx.drawImage(charImages[player.charIdx], -pX - pW, pY, pW, pH);
    } else {
      ctx.drawImage(charImages[player.charIdx], pX, pY, pW, pH);
    }
    ctx.restore();
    // Colored border
    ctx.strokeStyle = ch.color; ctx.lineWidth = 2;
    ctx.strokeRect(pX, pY, pW, pH);
  } else {
    // Fallback block
    ctx.fillStyle = ch.color; ctx.fillRect(sx, sy, player.w, player.h-8);
    ctx.fillStyle = lighten(ch.color, 35); ctx.fillRect(sx+2, sy, player.w-4, player.h*0.4);
    const ex2 = player.facing > 0 ? sx+player.w-11 : sx+4;
    ctx.fillStyle = '#fff'; ctx.fillRect(ex2, sy+6, 8, 8);
    ctx.fillStyle = '#111'; ctx.fillRect(ex2+(player.facing>0?2:1), sy+8, 4, 5);
  }

  ctx.shadowBlur = 0;

  // Name tag
  ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center';
  const tw = ctx.measureText(ch.name).width + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(sx+player.w/2-tw/2, sy-21, tw, 14);
  ctx.fillStyle = ch.color; ctx.fillText(ch.name, sx+player.w/2, sy-10);
}

function drawParticles() {
  for (const p of particles) {

    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camera.x - p.sz/2, p.y - p.sz/2, p.sz, p.sz);

}

  const cols = 3, cw = 245, ch2 = 132, pad = 8;

  for (let i = 0; i < CHARS.length; i++) {

      ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

      ctx.strokeStyle = sel ? ch.color : '#2a4a8a'; ctx.lineWidth = sel?2:1;

}

// ---- INPUT HANDLING PER STATE ----
function handleMenuInput() {
  if (jp['Enter'] || jp['Space']) gameState = 'select';
}
function handleSelectInput() {
  const cols = 3;
  if (jp['ArrowLeft']  || jp['KeyA']) selectedChar = (selectedChar-1+CHARS.length)%CHARS.length;
  if (jp['ArrowRight'] || jp['KeyD']) selectedChar = (selectedChar+1)%CHARS.length;
  if (jp['ArrowUp']    || jp['KeyW']) selectedChar = (selectedChar-cols+CHARS.length)%CHARS.length;
  if (jp['ArrowDown']  || jp['KeyS']) selectedChar = (selectedChar+cols)%CHARS.length;
  if (jp['Enter'] || jp['Space']) initGame(selectedChar);
}
function handleGameoverInput() {
  if (jp['Enter'] || jp['Space']) initGame(player.charIdx);
  if (jp['Escape']) gameState = 'select';
}
function handleWinInput() {
  if (jp['Enter'] || jp['Space']) { gameState = 'select'; selectedChar = 0; }
}

// ---- MAIN LOOP ----
function loop() {
  ctx.clearRect(0,0,W,H);

  switch (gameState) {
    case 'menu':
      drawMenu();
      handleMenuInput();
      break;
    case 'select':
      drawSelect();
      handleSelectInput();
      break;
    case 'playing':
      update();
      drawBG(); drawPlatforms();
      if (!isBossLevel) { drawGoal(); drawCoins(); drawEnemies(); }
      drawPowerups(); drawShockwaves();
      drawBoss();
      drawFireballs();
      drawPlayer(); drawParticles(); drawHUD();
      if (isBossLevel) drawBossHUD();
      break;
    case 'gameover':
      drawBG(); drawPlatforms(); drawShockwaves(); drawBoss(); drawParticles();
      drawGameOver();
      handleGameoverInput();
      break;
    case 'win':
      drawBG(); drawParticles();
      drawWin();
      handleWinInput();
      break;
  }

  jp = {}; // clear just-pressed each frame
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
